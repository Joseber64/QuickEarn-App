<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickEarn - Gana Dinero Rápido</title>
    <style>
        :root { --primary: #00FF00; --secondary: #FF8C00; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: white; text-align: center; }
        .hero { padding: 60px 20px; background: linear-gradient(135deg, #004d00, #1a1a1a); }
        h1 { color: var(--primary); font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; color: #ccc; }
        .btn { 
            display: inline-block; background: var(--secondary); color: white; 
            padding: 15px 30px; text-decoration: none; border-radius: 50px; 
            font-weight: bold; margin-top: 20px; box-shadow: 0 4px 15px rgba(255, 140, 0, 0.4);
        }
        .features { display: flex; flex-wrap: wrap; justify-content: center; padding: 40px; }
        .card { background: #222; padding: 20px; margin: 10px; border-radius: 15px; width: 250px; border-bottom: 4px solid var(--primary); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>QuickEarn</h1>
        <p>La app #1 en México para generar ingresos desde tu móvil.</p>
        <a href="#" class="btn">DESCARGAR APK</a>
    </div>
    <div class="features">
        <div class="card"><h3>✅ Micro-tareas</h3><p>Valida datos y gana puntos.</p></div>
        <div class="card"><h3>📝 Encuestas</h3><p>Tu opinión vale dinero real.</p></div>
        <div class="card"><h3>💰 Retiros</h3><p>Pagos rápidos a tu cuenta.</p></div>
    </div>
</body>
</html>
